name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Pure F# brain: fast, no graphics stack needed.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test WTF.slnx -c Release

  # Full pipeline per distro: deps -> vendored wayland/wlroots/scenefx -> shim
  # -> self-contained publish -> atomic install -> HEADLESS boot of the real
  # compositor -> IPC smoke -> graceful shutdown.
  #
  # The container is run MANUALLY (docker run) instead of `container:` because
  # scenefx's fx_renderer needs a DRM render node even for software GL: we
  # `modprobe vgem` on the runner VM and pass /dev/dri through, and Mesa's
  # kms_swrast renders on it (the standard wayland-compositor CI trick).
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:trixie
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: fedora
            image: fedora:latest
          - distro: arch
            image: archlinux:latest
          - distro: opensuse
            image: opensuse/tumbleweed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: software DRM node (vgem) for the GLES renderer
        run: |
          sudo modprobe vgem || sudo modprobe vkms || true
          ls -la /dev/dri || echo "no /dev/dri — smoke will fail loudly"
      - name: build + install + smoke inside ${{ matrix.image }}
        # Container package-repo pulls are occasionally flaky (network/mirror hiccups) —
        # observed both attempt-1-fails-attempt-2-passes on identical commits. Retry
        # before failing the job instead of relying on a manual re-run.
        run: |
          for attempt in 1 2 3; do
            if docker run --rm --device /dev/dri \
              -v "$PWD:/w" -w /w \
              -e WTF_ALLOW_ROOT=1 \
              ${{ matrix.image }} \
              bash scripts/ci-inside.sh; then
              exit 0
            fi
            echo "smoke run failed (attempt $attempt/3), retrying in 5s..." >&2
            sleep 5
          done
          echo "smoke run failed after 3 attempts" >&2
          exit 1
      - name: upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log-${{ matrix.distro }}
          path: smoke-run/smoke.log
          if-no-files-found: ignore
