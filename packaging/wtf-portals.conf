# xdg-desktop-portal backend routing for the WTF session.
#
# Installed to /usr/share/xdg-desktop-portal/wtf-portals.conf and selected when
# XDG_CURRENT_DESKTOP=wtf (set by DesktopNames=wtf in wtf.desktop). It tells
# xdg-desktop-portal which backend serves each portal interface:
#   - Screenshot + ScreenCast  -> xdg-desktop-portal-wlr  (uses the compositor's
#       wlr-screencopy / export-dmabuf protocols, which the WTF shim now exports)
#   - everything else (FileChooser, Settings, ...) -> xdg-desktop-portal-gtk
#
# Requires these packages on the target:
#   xdg-desktop-portal  xdg-desktop-portal-wlr  xdg-desktop-portal-gtk
# (screenshot CLIs grim + slurp are handy but optional; they use screencopy directly.)

[preferred]
default=gtk
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.ScreenCast=wlr
